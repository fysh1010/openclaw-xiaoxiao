  <path d="M75 35 Q90 20 95 30 Q100 40 90 50 Q80 55 70 50" fill="#ff4757" stroke="#e84118" stroke-width="2"/>
  <circle cx="92" cy="32" r="5" fill="#ff6b81"/>
  <!-- 腿 -->
  <path d="M35 70 L30 85" stroke="#ff4757" stroke-width="4" stroke-linecap="round"/>
  <path d="M45 73 L40 90" stroke="#ff4757" stroke-width="4" stroke-linecap="round"/>
  <path d="M55 73 L60 90" stroke="#ff4757" stroke-width="4" stroke-linecap="round"/>
  <path d="M65 70 L70 85" stroke="#ff4757" stroke-width="4" stroke-linecap="round"/>
  <!-- 尾巴 -->
  <path d="M70 60 L90 50 L85 70 L95 80 L75 75 Z" fill="#ff4757"/>
</svg>