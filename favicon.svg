  <path d="M25 35 Q10 20 5 30 Q0 40 10 50 Q20 55 30 50" fill="#ff4757" stroke="#e84118" stroke-width="2"/>
  <circle cx="8" cy="32" r="5" fill="#ff6b81"/>
